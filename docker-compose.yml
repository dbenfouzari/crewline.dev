services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      target: server
    ports:
      - "3000:3000"
    environment:
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/data/crewline.db
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_PATH=/data/crewline.db
    volumes:
      - data:/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
  redis-data:
